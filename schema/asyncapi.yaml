asyncapi: 2.6.0
info:
  title: Independent Nodes Mesh - NATS Contract
  version: 1.0.0
channels:
  sensor.gps:
    publish:
      message:
        $ref: '#/components/messages/GPSData'
  alert.safety.node:
    publish:
      message:
        $ref: '#/components/messages/Alert'
  mission.entities.delta:
    publish:
      message:
        $ref: '#/components/messages/EntityDelta'
components:
  messages:
    GPSData:
      payload:
        $ref: '#/components/schemas/GPSData'
    Alert:
      payload:
        $ref: '#/components/schemas/Alert'
    EntityDelta:
      payload:
        $ref: '#/components/schemas/EntityDelta'
  schemas:
    GPSData:
      type: object
      properties:
        node:
          type: string
        lat:
          type: number
        lng:
          type: number
        timestamp:
          type: string
          format: date-time
      required: [node, lat, lng, timestamp]
    Alert:
      type: object
      properties:
        node:
          type: string
        type:
          type: string
        severity:
          $ref: '#/components/schemas/AlertSeverity'
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/AlertData'
      required: [node, type, severity, message, timestamp]
    EntityDelta:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/DeltaType'
        mission_id:
          type: string
        entity_id:
          type: string
        version:
          type: integer
        last_change_seq:
          type: integer
        origin_node:
          type: string
      required: [type, mission_id, entity_id, version, last_change_seq, origin_node]
    AlertSeverity:
      type: string
      enum: [low, medium, high]
    DeltaType:
      type: string
      enum: [changed, reload]
    AlertData:
      type: object
      additionalProperties: true

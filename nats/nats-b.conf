# NATS Server - Node B
# Leaf node topology: Node B initiates a leaf connection to Node A.
# The connection is bidirectional once established.

server_name: nats-b
port: 4222

# Monitor port for healthchecks
http_port: 8222

# JetStream — unique domain per node to avoid leaf node loop detection
jetstream {
    store_dir: /data/jetstream
    max_mem: 64M
    max_file: 256M
    domain: node-b
}

# Leaf node configuration — symmetric connectivity
leafnodes {
    port: 7422
    remotes [
        {
            url: "nats://node-a-nats:7422"
        }
    ]
}

# WebSocket configuration for direct browser connections
websocket {
    port: 8080
    no_tls: true
}

# Logging
debug: false
trace: false
logtime: true

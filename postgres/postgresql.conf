# ---- Default PostgreSQL settings ----
listen_addresses = '*'
port = 5432

# ---- pglogical requirements ----
shared_preload_libraries = 'pglogical'
wal_level = logical
max_replication_slots = 10
max_wal_senders = 10
max_worker_processes = 10

# ---- Logging ----
log_min_messages = warning
log_statement = 'ddl'

# ---- Memory (conservative for edge devices) ----
shared_buffers = 32MB
work_mem = 4MB

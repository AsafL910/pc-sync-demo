# NATS Server - Node A
# Leaf node topology: Node A accepts leaf connections from Node B.
# The connection is bidirectional once established.

server_name: nats-a
port: 4222

# Monitor port for healthchecks
http_port: 8222

# JetStream — unique domain per node to avoid leaf node loop detection
jetstream {
    store_dir: /data/jetstream
    max_mem: 64M
    max_file: 256M
    domain: node_a
}

# Leaf node configuration — accept inbound leaf connections
leafnodes {
    port: 7422
}

# WebSocket configuration for direct browser connections
websocket {
    port: 8080
    no_tls: true
}

# Logging
debug: false
trace: false
logtime: true
